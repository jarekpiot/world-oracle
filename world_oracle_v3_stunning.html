<style>
*{margin:0;padding:0;box-sizing:border-box}
#wo{width:100%;height:620px;background:#020d18;border-radius:14px;overflow:hidden;position:relative;cursor:default}
canvas{display:block;position:absolute;top:0;left:0}
#ui{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none}
#top{position:absolute;top:18px;left:50%;transform:translateX(-50%);text-align:center}
#wtitle{font:500 10px/1 sans-serif;color:#2a6a8a;letter-spacing:0.18em;text-transform:uppercase}
#wconf{font:200 36px/1 sans-serif;color:#c8e8f8;margin-top:6px;letter-spacing:0.04em}
#wview{font:400 11px/1 sans-serif;margin-top:5px;letter-spacing:0.1em}
#ticker{position:absolute;bottom:50px;left:50%;transform:translateX(-50%);font:400 10px/1 sans-serif;color:#2a6a8a;letter-spacing:0.07em;white-space:nowrap;transition:opacity 1s}
#ctrls{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:8px;pointer-events:all}
.cb{font:400 10px/1 sans-serif;color:#2a6a8a;padding:5px 14px;border:0.5px solid #0a2a3a;border-radius:20px;cursor:pointer;transition:all 0.25s;letter-spacing:0.06em;background:rgba(2,13,24,0.6)}
.cb:hover,.cb.on{color:#7dd4f8;border-color:#1a6a8a}
#legend{position:absolute;right:18px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:8px}
.le{display:flex;align-items:center;gap:6px;font:400 9px/1 sans-serif;opacity:0.6;transition:opacity 0.2s}
.le:hover{opacity:1}
.ld{width:6px;height:6px;border-radius:50%}
#tooltip{position:absolute;background:rgba(2,13,24,0.95);border:0.5px solid #0a3a4a;border-radius:8px;padding:9px 13px;font:400 11px/1.6 sans-serif;color:#a8d8f0;display:none;pointer-events:none;max-width:200px}
</style>

<div id="wo">
<canvas id="bg"></canvas>
<canvas id="c"></canvas>
<div id="ui">
  <div id="top">
    <div id="wtitle">world oracle</div>
    <div id="wconf">0.74</div>
    <div id="wview" style="color:#2dd4a0">▲ bullish · crude oil · T2 strategic</div>
  </div>
  <div id="legend">
    <div class="le"><div class="ld" style="background:#cc3322"></div><span style="color:#e05040">war · conflict</span></div>
    <div class="le"><div class="ld" style="background:#6655cc"></div><span style="color:#9988ee">T3 structural</span></div>
    <div class="le"><div class="ld" style="background:#118866"></div><span style="color:#22cc88">T2 macro</span></div>
    <div class="le"><div class="ld" style="background:#996611"></div><span style="color:#ddaa33">T1 narrative</span></div>
    <div class="le"><div class="ld" style="background:#115588"></div><span style="color:#44aaee">T0 heartbeat</span></div>
  </div>
  <div id="ticker">reading world breath — all four layers active</div>
  <div id="ctrls">
    <div class="cb on" id="b-live">live</div>
    <div class="cb" id="b-war">war mode</div>
    <div class="cb" id="b-align">full align</div>
    <div class="cb" id="b-pause">pause</div>
  </div>
  <div id="tooltip"></div>
</div>
</div>

<script>
const bgC = document.getElementById('bg');
const bgX = bgC.getContext('2d');
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const wrap = document.getElementById('wo');

let W,H,cx,cy,t=0,paused=false,warMode=false,fullAlign=false;
const DPR = Math.min(devicePixelRatio,2);

function resize(){
  const r=wrap.getBoundingClientRect();
  W=r.width; H=620;
  [bgC,c].forEach(cv=>{
    cv.width=W*DPR; cv.height=H*DPR;
    cv.style.width=W+'px'; cv.style.height=H+'px';
  });
  bgX.scale(DPR,DPR); ctx.scale(DPR,DPR);
  cx=W/2; cy=H/2-18;
  drawStars();
}

// Stars — draw once on bg canvas
function drawStars(){
  bgX.clearRect(0,0,W,H);
  bgX.fillStyle='#020d18';
  bgX.fillRect(0,0,W,H);
  const rng=(s)=>{let x=s;return()=>{x=((x*1664525+1013904223)&0xffffffff)/0xffffffff};};
  const r=rng(42);
  for(let i=0;i<280;i++){
    const x=r()*W, y=r()*H;
    const sz=r()*1.2+0.2;
    const a=r()*0.5+0.1;
    bgX.beginPath();
    bgX.arc(x,y,sz,0,Math.PI*2);
    bgX.fillStyle=`rgba(180,210,240,${a})`;
    bgX.fill();
  }
}
resize();
window.addEventListener('resize',()=>{resize()});

// Rings definition
const RINGS=[
  {id:'war', r:210, col:'#cc3322', glow:'#ff5533', period:6.5,  ph:0,   width:1.2, dash:[4,8]},
  {id:'t3',  r:175, col:'#5544bb', glow:'#9988ee', period:8,    ph:1.3, width:1,   dash:[]},
  {id:'t2',  r:138, col:'#117755', glow:'#22cc88', period:4,    ph:2.2, width:1.2, dash:[]},
  {id:'t1',  r:101, col:'#886611', glow:'#ddaa33', period:2,    ph:0.7, width:1,   dash:[]},
  {id:'t0',  r:67,  col:'#114477', glow:'#44aaee', period:0.5,  ph:3.1, width:1.5, dash:[]},
];

// Nodes
const NODES=[
  {ri:0,ang:1.8,  lab:'Red Sea blockade',    dir:'bearish', conf:0.83, ag:'war'},
  {ri:0,ang:4.3,  lab:'Hormuz watch',        dir:'bearish', conf:0.76, ag:'war'},
  {ri:1,ang:0.4,  lab:'energy transition',   dir:'bearish', conf:0.71, ag:'structural'},
  {ri:1,ang:2.4,  lab:'commodity supercycle',dir:'bullish', conf:0.68, ag:'structural'},
  {ri:1,ang:4.2,  lab:'USD cycle',           dir:'neutral', conf:0.58, ag:'structural'},
  {ri:2,ang:0.9,  lab:'EIA inventory draw',  dir:'bullish', conf:0.82, ag:'inventory'},
  {ri:2,ang:2.1,  lab:'OPEC compliance',     dir:'bullish', conf:0.74, ag:'inventory'},
  {ri:2,ang:3.8,  lab:'China PMI',           dir:'neutral', conf:0.61, ag:'macro'},
  {ri:2,ang:5.3,  lab:'Baltic Dry rise',     dir:'bullish', conf:0.69, ag:'shipping'},
  {ri:3,ang:1.0,  lab:'Middle East arc',     dir:'bullish', conf:0.77, ag:'geopolitical'},
  {ri:3,ang:2.6,  lab:'NOAA cold snap',      dir:'bullish', conf:0.65, ag:'weather'},
  {ri:3,ang:4.0,  lab:'narrative rising',    dir:'bullish', conf:0.63, ag:'narrative'},
  {ri:3,ang:5.5,  lab:'Ukraine supply',      dir:'bearish', conf:0.59, ag:'geopolitical'},
  {ri:4,ang:0.5,  lab:'WTI $94.65 +4.2%',   dir:'bullish', conf:0.85, ag:'price'},
  {ri:4,ang:3.4,  lab:'order flow bid',      dir:'bullish', conf:0.72, ag:'price'},
];

const DCOL={bullish:'#22dd99',bearish:'#ff5533',neutral:'#888880',unknown:'#333330'};
const DLAB={bullish:'▲',bearish:'▼',neutral:'━'};

// Particle pool
const PARTS=[];
function spark(x,y,dir,n=6){
  const col=DCOL[dir]||'#888880';
  for(let i=0;i<n;i++){
    PARTS.push({x,y,tx:cx+(Math.random()-0.5)*20,ty:cy+(Math.random()-0.5)*20,
      col,life:1,speed:0.015+Math.random()*0.012,size:1.2+Math.random()*1.8});
  }
}

// Ticker
const TICKS=[
  'EIA crude draw 3.2mb — T2 bullish thesis intact',
  'war premium holding — Red Sea disruption week 14',
  'T3 energy transition: 10yr demand ceiling forming',
  'T0 heartbeat: WTI $94.65 +4.28% — price confirming',
  'oracle confidence 0.74 — T2+T1 aligned, T0 bullish',
  'geopolitical arc: middle east stalemate phase',
  'narrative velocity rising — crude bull story mid-stage',
  'T2 inventory cycle: 4th consecutive weekly draw',
  'USD mid-cycle — commodity tailwind 4–8 months',
  'devil\'s advocate: inventory build could reverse in 2w',
];
let ti=0;
const tel=document.getElementById('ticker');
tel.style.transition='opacity 0.8s';
function rotateTick(){
  tel.style.opacity=0;
  setTimeout(()=>{tel.textContent=TICKS[ti++%TICKS.length];tel.style.opacity=1;},600);
}
rotateTick(); setInterval(rotateTick,4000);

// Draw aurora bands (depth)
function drawAurora(breath){
  const bands=[
    {r:230,col:'#0a2040',a:0.12},
    {r:185,col:'#091830',a:0.14},
    {r:145,col:'#081428',a:0.16},
    {r:108,col:'#070f20',a:0.18},
  ];
  bands.forEach(b=>{
    ctx.beginPath();
    ctx.arc(cx,cy,b.r+breath*3,0,Math.PI*2);
    ctx.fillStyle=b.col;
    ctx.globalAlpha=b.a;
    ctx.fill();
    ctx.globalAlpha=1;
  });
}

function drawRings(breath){
  RINGS.forEach((ring,i)=>{
    const pulse=Math.sin(t*(Math.PI*2/ring.period)+ring.ph);
    const pr=ring.r+pulse*(warMode&&i===0?10:5)+(fullAlign?2:0);
    const baseA=warMode&&i===0?0.5:0.2;
    const a=baseA+0.15*((pulse+1)/2)*(fullAlign?1.8:1);

    // outer glow ring
    ctx.beginPath();
    ctx.arc(cx,cy,pr+8,0,Math.PI*2);
    ctx.strokeStyle=ring.glow;
    ctx.lineWidth=4;
    ctx.globalAlpha=a*0.18;
    ctx.stroke();
    ctx.globalAlpha=1;

    // main ring
    if(warMode&&i===0){
      // fragmented war ring
      ctx.save();
      for(let a2=0;a2<Math.PI*2;a2+=0.08){
        const gap=Math.sin(a2*9+t*1.4)>0.25+0.15*Math.sin(t*0.7);
        if(gap)continue;
        ctx.beginPath();
        ctx.arc(cx,cy,pr,a2,a2+0.07);
        ctx.strokeStyle=ring.glow;
        ctx.lineWidth=ring.width+1;
        ctx.globalAlpha=a*1.6;
        ctx.stroke();
        ctx.globalAlpha=1;
      }
      ctx.restore();
    } else {
      ctx.beginPath();
      ctx.arc(cx,cy,pr,0,Math.PI*2);
      ctx.strokeStyle=ring.glow;
      ctx.lineWidth=ring.width*(fullAlign?1.8:1);
      ctx.globalAlpha=a*(fullAlign?1.5:1);
      if(ring.dash.length) ctx.setLineDash(ring.dash);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha=1;
    }
  });
}

function drawNodes(){
  NODES.forEach(n=>{
    const ring=RINGS[n.ri];
    const spd=({war:0.00025,t3:0.0006,t2:0.0012,t1:0.0025,t0:0.006})[ring.id]||0.001;
    const ang=n.ang+t*spd*60;
    const nx=cx+ring.r*Math.cos(ang);
    const ny=cy+ring.r*Math.sin(ang);
    const col=DCOL[n.dir];
    const sz=3.5+n.conf*5;

    // soft halo
    ctx.beginPath();
    ctx.arc(nx,ny,sz*3,0,Math.PI*2);
    ctx.fillStyle=col;
    ctx.globalAlpha=0.07+0.04*Math.sin(t*2.5+n.ang);
    ctx.fill();
    ctx.globalAlpha=1;

    // mid glow
    ctx.beginPath();
    ctx.arc(nx,ny,sz*1.6,0,Math.PI*2);
    ctx.fillStyle=col;
    ctx.globalAlpha=0.18+0.08*Math.sin(t*2+n.ang);
    ctx.fill();
    ctx.globalAlpha=1;

    // core dot
    ctx.beginPath();
    ctx.arc(nx,ny,sz,0,Math.PI*2);
    ctx.fillStyle=col;
    ctx.globalAlpha=0.85+0.15*Math.sin(t*3+n.ang);
    ctx.fill();
    ctx.globalAlpha=1;

    // thread to core
    const tdist=Math.sqrt((nx-cx)**2+(ny-cy)**2);
    const ta=Math.max(0,0.06-(tdist/ring.r)*0.04);
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(nx,ny);
    ctx.strokeStyle=col;
    ctx.lineWidth=0.4;
    ctx.globalAlpha=ta*(fullAlign?2.5:1);
    ctx.stroke();
    ctx.globalAlpha=1;

    // spark occasionally
    if(Math.random()<0.002) spark(nx,ny,n.dir);
  });
}

function drawParticles(){
  for(let i=PARTS.length-1;i>=0;i--){
    const p=PARTS[i];
    p.x+=(p.tx-p.x)*p.speed;
    p.y+=(p.ty-p.y)*p.speed;
    p.life-=0.016;
    if(p.life<=0){PARTS.splice(i,1);continue;}
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
    ctx.fillStyle=p.col;
    ctx.globalAlpha=p.life*0.85;
    ctx.fill();
    ctx.globalAlpha=1;
  }
}

function drawGlobe(breath){
  const r=38+breath*7+(fullAlign?4:0);
  const gcol=fullAlign?'#cc8800':warMode?'#882200':'#0a3060';
  const gcol2=fullAlign?'#ffaa00':warMode?'#ff3300':'#1fb8ff';

  // deep glow layers
  [[r*4.5,0.06],[r*3,0.1],[r*1.8,0.18]].forEach(([gr,ga])=>{
    ctx.beginPath();
    ctx.arc(cx,cy,gr,0,Math.PI*2);
    ctx.fillStyle=gcol2;
    ctx.globalAlpha=ga*(fullAlign?2.2:1)*(warMode?1.6:1)*(0.8+breath*0.4);
    ctx.fill();
    ctx.globalAlpha=1;
  });

  // globe body
  ctx.beginPath();
  ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle=gcol;
  ctx.globalAlpha=0.97;
  ctx.fill();
  ctx.globalAlpha=1;

  // globe rim
  ctx.beginPath();
  ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle=gcol2;
  ctx.lineWidth=fullAlign?2.5:1.5;
  ctx.globalAlpha=(0.5+breath*0.45)*(fullAlign?1.5:1);
  ctx.stroke();
  ctx.globalAlpha=1;

  // continent impressions
  ctx.globalAlpha=0.12+breath*0.05;
  ctx.strokeStyle='#a0d0f0';
  ctx.lineWidth=0.6;
  const arcs=[
    [0.3,1.1,0.55],[1.3,2.2,0.65],[2.1,3.1,0.5],
    [3.3,4.0,0.7],[4.2,5.1,0.45],[5.3,6.0,0.6]
  ];
  arcs.forEach(([sa,ea,ri])=>{
    ctx.beginPath();
    ctx.arc(cx+Math.cos(t*0.04)*2,cy+Math.sin(t*0.03)*1.5,r*ri,sa,ea);
    ctx.stroke();
  });
  ctx.globalAlpha=1;

  // inner light point
  ctx.beginPath();
  ctx.arc(cx-r*0.25,cy-r*0.25,r*0.18,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.08)';
  ctx.fill();
}

function updateUI(){
  const conf=fullAlign?0.88:warMode?0.61:0.74;
  document.getElementById('wconf').textContent=conf.toFixed(2);
  const vEl=document.getElementById('wview');
  if(fullAlign){
    vEl.textContent='▲ bullish · all layers aligned · high conviction';
    vEl.style.color='#ffaa00';
  } else if(warMode){
    vEl.textContent='⚠ war premium dominant · T1 geopolitical elevated';
    vEl.style.color='#ff5533';
  } else {
    vEl.textContent='▲ bullish · crude oil · T2 strategic';
    vEl.style.color='#22cc88';
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);
  const breath=0.5+0.5*Math.sin(t*0.55);
  drawAurora(breath);
  drawRings(breath);
  drawNodes();
  drawParticles();
  drawGlobe(breath);
  updateUI();
  if(!paused) t+=0.016;
  requestAnimationFrame(draw);
}
draw();

// Controls
document.getElementById('b-pause').addEventListener('click',function(){
  paused=!paused;
  this.classList.toggle('on',paused);
});
document.getElementById('b-war').addEventListener('click',function(){
  warMode=!warMode; fullAlign=false;
  this.classList.toggle('on',warMode);
  document.getElementById('b-align').classList.remove('on');
});
document.getElementById('b-align').addEventListener('click',function(){
  fullAlign=!fullAlign; warMode=false;
  this.classList.toggle('on',fullAlign);
  document.getElementById('b-war').classList.remove('on');
});
document.getElementById('b-live').addEventListener('click',function(){
  warMode=false; fullAlign=false; paused=false;
  document.getElementById('b-war').classList.remove('on');
  document.getElementById('b-align').classList.remove('on');
  document.getElementById('b-pause').classList.remove('on');
});

// Tooltip on hover
c.addEventListener('mousemove',function(e){
  const r=c.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  const tip=document.getElementById('tooltip');
  let hit=false;
  NODES.forEach(n=>{
    const ring=RINGS[n.ri];
    const spd=({war:0.00025,t3:0.0006,t2:0.0012,t1:0.0025,t0:0.006})[ring.id]||0.001;
    const ang=n.ang+t*spd*60;
    const nx=cx+ring.r*Math.cos(ang);
    const ny=cy+ring.r*Math.sin(ang);
    if(Math.hypot(mx-nx,my-ny)<16){
      tip.style.display='block';
      tip.style.left=Math.min(nx+18,W-210)+'px';
      tip.style.top=Math.max(ny-30,10)+'px';
      const col=DCOL[n.dir];
      tip.innerHTML=`<span style="color:${col};font-weight:500">${DLAB[n.dir]} ${n.dir}</span><br>${n.lab}<br><span style="color:#4a7a9a;font-size:10px">${n.ag} · ${Math.round(n.conf*100)}% confidence · ${ring.id}</span>`;
      hit=true;
    }
  });
  if(!hit) tip.style.display='none';
  c.style.cursor=hit?'pointer':'default';
});
c.addEventListener('mouseleave',()=>{document.getElementById('tooltip').style.display='none'});
</script>
